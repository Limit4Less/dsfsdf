<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>da21d5s1adad1as561</title>
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
  <link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      color: #0f0;
      font-family: "Press Start 2P", monospace;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .owner-icon {
      font-size: 1rem;
      vertical-align: middle;
      margin-left: 0.3rem;
    }

    #login, #chat-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #login form {
      background: black;
      border: 4px solid #0f0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #chat-container {
      flex: 1;
      display: none; /* Chat container is hidden by default */
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 1rem;
    }

    body.logged-in #login {
      display: none;
    }

    .chat-columns {
      display: flex;
      flex: 1;
      height: calc(100vh - 6rem); /* Account for container padding */
    }

    .user-list {
      flex-basis: 200px;
      min-width: 150px;
      border-right: 2px solid #0f0;
      padding: 1rem;
      overflow-y: auto;
    }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* Important for flex child to shrink */
    }
    
    .chat-scrollable-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem;
      border: 2px solid #0f0;
      margin-bottom: 1rem;
      margin-left: 1rem;
      max-height: calc(100vh - 12rem); /* Ensure it doesn't grow too large */
    }

    #messages {
      word-wrap: break-word;
      word-break: break-all;
      min-height: 100%;
    }

    .msg {
      margin: 0.5rem 0;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    .msg.fade-out { opacity: 0; }

    .name { color: #0ff; margin-right: 0.5rem; }
    .owner-name { color: #ff0; margin-right: 0.5rem; }

    .notice { color: #ff0; font-style: italic; }

    #composer {
      display: flex;
      gap: 0.5rem;
      border-top: 2px solid #0f0;
      padding: 0.5rem;
      margin-left: 1rem;
      flex-shrink: 0; /* Don't shrink the composer */
    }

    img, video {
      max-width: 200px;
      max-height: 200px;
      border: 2px solid #0f0;
      margin-top: 0.5rem;
    }

    #users div {
      margin: 0.2rem 0;
    }

    .nes-input, .nes-btn {
      font-family: "Press Start 2P", monospace;
    }

    .rainbow-text {
      background-image: linear-gradient(
        to right,
        #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow-animation 5s infinite;
    }

    @keyframes rainbow-animation {
      0% {
        filter: hue-rotate(0deg);
      }
      100% {
        filter: hue-rotate(360deg);
      }
    }

    /* Custom scrollbar styling for webkit browsers */
    .chat-scrollable-area::-webkit-scrollbar {
      width: 8px;
    }

    .chat-scrollable-area::-webkit-scrollbar-track {
      background: #000;
      border: 1px solid #0f0;
    }

    .chat-scrollable-area::-webkit-scrollbar-thumb {
      background: #0f0;
      border-radius: 0;
    }

    .chat-scrollable-area::-webkit-scrollbar-thumb:hover {
      background: #0ff;
    }

    /* Cat raid animation styles */
    .cat-raid-image {
      position: fixed;
      width: 150px;
      height: 150px;
      object-fit: cover;
      border: 3px solid #0f0;
      border-radius: 12px;
      z-index: 9999;
      animation: catFall 10s linear forwards;
      pointer-events: none;
      box-shadow: 0 0 10px #0f0;
    }

    @keyframes catFall {
      0% {
        transform: translateY(-150px) rotate(0deg) scale(0.5);
        opacity: 1;
      }
      50% {
        transform: translateY(50vh) rotate(180deg) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(calc(100vh + 150px)) rotate(720deg) scale(0.8);
        opacity: 0;
      }
    }

    #spam-warning {
      margin-left: 1rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<div id="login">
  <form class="nes-container is-dark">
    <h1 class="nes-text is-success">Ephemeral</h1>
    <input id="pwd" type="password" class="nes-input is-dark" placeholder="Password">
    <input id="name" type="text" class="nes-input is-dark" placeholder="Display Name">
    <button type="button" id="join" class="nes-btn is-success">Enter Chat</button>
    <p id="status" class="nes-text is-error"></p>
  </form>
</div>

<div id="chat-container" class="nes-container is-dark with-title">
  <p class="title">Chat Room</p>
  <div class="chat-columns">
    <div class="user-list">
      <h2 class="nes-text is-success">Online</h2>
      <div id="users"></div>
    </div>
    <div class="chat-panel">
      <div class="chat-scrollable-area">
        <div id="messages"></div>
      </div>
      <div id="composer">
        <input id="msg" class="nes-input is-dark" placeholder="Type a message" maxlength="500">
        <input type="file" id="fileInput" class="nes-input is-dark">
        <button id="send" class="nes-btn is-success">Send</button>
      </div>
      <div id="spam-warning" class="nes-text is-error"></div>
    </div>
  </div>
</div>

<script>
let socket, token, user;
const loginDiv = document.getElementById('login');
const chatContainer = document.getElementById('chat-container');
const statusEl = document.getElementById('status');
const messagesDiv = document.getElementById('messages');
const usersDiv = document.getElementById('users');
const spamWarning = document.getElementById('spam-warning');
const fileInput = document.getElementById('fileInput');
const loginButton = document.getElementById('join');
const sendButton = document.getElementById('send');
const msgInput = document.getElementById('msg');

let messageCount = 0;
let lastMessageTime = Date.now();
const messageLimit = 5;
const waitTime = 5000; // 5 seconds

function addMessage(name, text, file = null, notice = false, isOwner = false) {
  const div = document.createElement('div');
  div.className = notice ? 'notice' : 'msg';

  let nameClass = isOwner ? 'owner-name' : 'name';
  let nameContent = name;
  
  // Apply rainbow effect to "Jeb_" in messages
  if (name === 'Jeb_') {
    nameContent = `<span class="rainbow-text">${name}</span>`;
    nameClass = ''; // Don't apply additional color class
  }

  let content = notice
    ? text
    : `<span class="${nameClass}">${nameContent}</span>: ${text}`;

  if (file) {
    const ext = file.split('.').pop().toLowerCase();
    if (['png','jpg','jpeg','gif','webp'].includes(ext)) content += `<br><img src="${file}">`;
    else if (['mp4','webm','ogg'].includes(ext)) content += `<br><video src="${file}" controls></video>`;
    else content += `<br><a href="${file}" target="_blank">Download file</a>`;
  }

  div.innerHTML = content;
  messagesDiv.appendChild(div);
  
  // Auto-scroll to bottom with a small delay to ensure DOM is updated
  const scrollableArea = document.querySelector('.chat-scrollable-area');
  setTimeout(() => {
    scrollableArea.scrollTop = scrollableArea.scrollHeight;
  }, 10);
  
  return div;
}

function updateUsers(list){
  usersDiv.innerHTML = '';
  list.forEach(u=>{
    const div = document.createElement('div');
    if(u.includes("👑")){
      const ownerName = u.replace(" 👑", "");
      div.innerHTML = `${ownerName} <i class="nes-octocat animate"></i>`;
    } else if (u === 'Jeb_') {
      div.innerHTML = `<span class="rainbow-text">${u}</span>`;
    } else {
      div.textContent = u;
    }
    usersDiv.appendChild(div);
  });
}

function startCatRaid() {
  const catCount = 50; // LOTS of cats!
  const duration = 10000; // 10 seconds
  const spawnDuration = 8000; // Keep spawning for 8 seconds
  
  // Function to get a random cat image URL
  function getRandomCatUrl() {
    const timestamp = Date.now();
    const random = Math.floor(Math.random() * 10000);
    const catSources = [
      `https://cataas.com/cat?t=${timestamp}&r=${random}`,
      `https://placekitten.com/${150 + Math.floor(Math.random() * 100)}/${150 + Math.floor(Math.random() * 100)}`,
      `https://loremflickr.com/200/200/cat?random=${random}`,
      `https://picsum.photos/200/200?random=${random}`, // Sometimes has cats
      `https://cataas.com/cat/cute?t=${timestamp}&r=${random}`,
      `https://cataas.com/cat/says/meow?fontSize=30&fontColor=white&t=${timestamp}`,
      `https://robohash.org/cat${random}.png?set=set4&size=200x200`,
      // Backup static cat images
      `https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=200&h=200&fit=crop&crop=face`,
      `https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=200&h=200&fit=crop&crop=face`,
      `https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=200&h=200&fit=crop&crop=face`
    ];
    
    return catSources[Math.floor(Math.random() * catSources.length)];
  }
  
  // Spawn cats continuously for the first 8 seconds
  const spawnInterval = setInterval(() => {
    const cat = document.createElement('img');
    cat.className = 'cat-raid-image';
    
    cat.src = getRandomCatUrl();
    cat.style.left = Math.random() * (window.innerWidth - 150) + 'px';
    cat.style.top = '-150px';
    
    // Add random effects
    cat.style.animationDelay = (Math.random() * 0.5) + 's';
    cat.style.filter = `hue-rotate(${Math.random() * 360}deg) brightness(${0.8 + Math.random() * 0.4})`;
    
    // Handle image load errors
    cat.onerror = function() {
      this.src = `https://placekitten.com/200/200?random=${Math.floor(Math.random() * 10000)}`;
    };
    
    document.body.appendChild(cat);
    
    // Remove the cat after animation completes
    setTimeout(() => {
      if (cat.parentNode) {
        cat.parentNode.removeChild(cat);
      }
    }, duration + 2000);
    
  }, 200); // Spawn a cat every 200ms
  
  // Initial burst of cats
  for (let i = 0; i < catCount; i++) {
    setTimeout(() => {
      const cat = document.createElement('img');
      cat.className = 'cat-raid-image';
      
      cat.src = getRandomCatUrl();
      cat.style.left = Math.random() * (window.innerWidth - 150) + 'px';
      cat.style.top = '-150px';
      cat.style.animationDelay = (Math.random() * 2) + 's';
      cat.style.filter = `hue-rotate(${Math.random() * 360}deg) brightness(${0.8 + Math.random() * 0.4})`;
      
      // Handle image load errors with fallback
      cat.onerror = function() {
        this.src = `https://placekitten.com/200/200?random=${Math.floor(Math.random() * 10000)}`;
      };
      
      document.body.appendChild(cat);
      
      setTimeout(() => {
        if (cat.parentNode) {
          cat.parentNode.removeChild(cat);
        }
      }, duration + 3000);
      
    }, Math.random() * 2000);
  }
  
  // Stop spawning after 8 seconds
  setTimeout(() => {
    clearInterval(spawnInterval);
  }, spawnDuration);
}

document.getElementById('join').onclick = async () => {
  loginButton.disabled = true;
  const pwd = document.getElementById('pwd').value.trim();
  const name = (document.getElementById('name').value.trim()||'anon').slice(0,64);

  const res = await fetch('/auth',{
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd, name })
  }).catch(()=> {
    statusEl.textContent = 'Server not reachable';
    loginButton.disabled = false;
    return;
  });

  if(!res) {
    loginButton.disabled = false;
    return;
  }
  const data = await res.json();
  if(!data.ok) {
    statusEl.textContent='Wrong password';
    loginButton.disabled = false;
    return;
  }

  token = data.token;
  user = data.user;
  const wsUrl = (location.protocol==='https:'?'wss://':'ws://')+location.host+'/?token='+encodeURIComponent(token);
  socket = new WebSocket(wsUrl);

  socket.onopen = ()=>{
    document.body.classList.add('logged-in');
    chatContainer.style.display='flex';
    socket.send(JSON.stringify({type:'join', name: user.displayName}));
  };

  socket.onmessage = e => {
    const msg = JSON.parse(e.data);
    if(msg.type === 'message') addMessage(msg.name, msg.text, msg.file, false, msg.isOwner);
    if(msg.type === 'history') msg.messages.forEach(m=>addMessage(m.name, m.text, m.file, false, m.isOwner));

    if(msg.type === 'cleared') {
      const allMessages = messagesDiv.querySelectorAll('.msg');
      allMessages.forEach(msgEl => {
        msgEl.classList.add('fade-out');
      });
      setTimeout(() => {
        messagesDiv.innerHTML = '';
        addMessage('SYSTEM', '--- messages cleared ---', null, true);
      }, 500);
    }
    if(msg.type === 'filesCleared') {
      const allMessages = messagesDiv.querySelectorAll('.msg');
      allMessages.forEach(msgEl => {
        if (msgEl.querySelector('img') || msgEl.querySelector('video') || msgEl.querySelector('a[href*="/uploads/"]')) {
          msgEl.classList.add('fade-out');
        }
      });
      setTimeout(() => {
        const messagesToKeep = Array.from(messagesDiv.querySelectorAll('.msg')).filter(msgEl => !msgEl.classList.contains('fade-out'));
        messagesDiv.innerHTML = '';
        messagesToKeep.forEach(m => messagesDiv.appendChild(m));
        addMessage('SYSTEM','--- uploaded files were cleared ---',null,true);
      }, 500);
    }

    if(msg.type === 'users') updateUsers(msg.list);
    if(msg.type === 'error') spamWarning.textContent=msg.msg;
    
    // Handle cat raid command
    if(msg.type === 'message' && msg.text === '/catraid' && msg.isOwner) {
      startCatRaid();
      addMessage('SYSTEM', '🐱💥 MEGA CAT RAID INCOMING! PREPARE FOR FELINE CHAOS! 💥🐱', null, true);
    }
  };

  socket.onclose = ()=> addMessage('SYSTEM','Disconnected.',null,true);
};

document.getElementById('send').onclick = () => {
  const text = msgInput.value.trim();
  const file = fileInput.files[0];

  // Anti-spam logic
  const now = Date.now();
  if (now - lastMessageTime < 1000) {
    messageCount++;
    if (messageCount >= messageLimit) {
      spamWarning.textContent = `You are sending too many messages. Please wait ${waitTime / 1000} seconds.`;
      sendButton.disabled = true;
      setTimeout(() => {
        sendButton.disabled = false;
        messageCount = 0;
        lastMessageTime = Date.now();
        spamWarning.textContent = '';
      }, waitTime);
      return;
    }
  } else {
    messageCount = 1;
  }
  lastMessageTime = now;

  if(!text && !file) return;

  if(user && user.isOwner && text.startsWith("/")){
    socket.send(JSON.stringify({type:'message', name: user.displayName, text}));
    msgInput.value='';
    return;
  }

  if(text) {
    socket.send(JSON.stringify({type:'message', name: user.displayName, text}));
    msgInput.value='';
  }

  if(file) {
    if(file.size > 10*1024*1024){ spamWarning.textContent='File too large (max 10MB)'; return; }
    const formData = new FormData();
    formData.append('file', file);
    formData.append('token', token);
    fetch('/upload', {method:'POST', body: formData})
      .then(r=>r.json()).then(d=>{ if(!d.ok) spamWarning.textContent = d.msg; });
    fileInput.value='';
  }
};

document.getElementById('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('send').click();
  }
});
</script>

</body>
</html>
